name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: leave-management-web/package-lock.json

      - name: Install dependencies
        working-directory: leave-management-web
        run: npm ci

      - name: Build production
        working-directory: leave-management-web
        run: npx ng build --configuration production

      - name: Run unit tests
        working-directory: leave-management-web
        run: npx ng test --watch=false --browsers=ChromeHeadless

